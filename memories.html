<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0C090A;
      --rose: #B85470;
      --rose-soft: #D4849A;
      --rose-faint: #3D222E;
      --gold: #C9A96E;
      --gold-dim: #8A7350;
      --cream: #EDE4DA;
      --text: #C8B8AA;
      --text-dim: #7A6A5E;
      --card: #151012;
      --card-border: #2A1F22;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(184,84,112,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    #petalCanvas {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    .envelope-hero {
      position: relative; z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }
    .hero-pre {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 32px;
      opacity: 0;
      animation: softIn 1.2s ease 0.3s forwards;
    }
    @keyframes softIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .envelope-box {
      position: relative;
      width: clamp(280px, 72vw, 400px);
      aspect-ratio: 1.55 / 1;
      perspective: 900px;
    }
    .env-body {
      position: absolute; inset: 0;
      background: linear-gradient(165deg, #1A1316, #21181C, #1A1316);
      border-radius: 8px;
      box-shadow: 0 0 0 1px rgba(201,169,110,0.1), 0 24px 64px rgba(0,0,0,0.5);
      overflow: hidden; z-index: 2;
    }
    .env-body::before {
      content: '';
      position: absolute; inset: 10px;
      border: 1px solid rgba(201,169,110,0.07);
      border-radius: 4px;
      pointer-events: none;
    }
    .env-pattern {
      position: absolute; inset: 0;
      opacity: 0.025;
      background-image: radial-gradient(circle, var(--gold) 0.5px, transparent 0.5px);
      background-size: 16px 16px;
    }
    .env-tri {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 54%;
      background: linear-gradient(180deg, #241A1E, #1C1416);
      clip-path: polygon(0 100%, 50% 0%, 100% 100%);
      z-index: 1;
    }
    .env-label {
      position: absolute;
      top: 16%; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.7rem, 2.2vw, 0.88rem);
      color: var(--gold-dim);
      opacity: 0.35;
      z-index: 4;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .env-lines {
      position: absolute;
      bottom: 20%; left: 20%; right: 20%;
      z-index: 4;
    }
    .env-lines span {
      display: block; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.1; margin-bottom: 5px;
    }
    .env-lines span:nth-child(1) { width: 100%; }
    .env-lines span:nth-child(2) { width: 65%; }

    .env-flap {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 58%;
      background: linear-gradient(180deg, #2A1E22, #221820);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      z-index: 5;
      transform-origin: top center;
      transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .env-flap::before {
      content: '';
      position: absolute; inset: 0;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      background: linear-gradient(180deg, rgba(201,169,110,0.05), transparent 50%);
    }
    .env-flap.open { transform: rotateX(180deg); z-index: 3; }

    .emblem {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(80px, 22vw, 110px);
      height: clamp(80px, 22vw, 110px);
      border-radius: 50%;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      background: radial-gradient(circle at 40% 35%, #D4849A, #B85470, #7A3048);
      box-shadow: 0 0 30px rgba(184,84,112,0.25), 0 0 80px rgba(184,84,112,0.08),
                  inset 0 -4px 10px rgba(0,0,0,0.35), inset 0 2px 6px rgba(255,255,255,0.1);
      border: none;
      transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.5s ease, opacity 0.5s ease;
      animation: emblemBreath 3s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes emblemBreath {
      0%, 100% { box-shadow: 0 0 30px rgba(184,84,112,0.25), 0 0 80px rgba(184,84,112,0.08), inset 0 -4px 10px rgba(0,0,0,0.35), inset 0 2px 6px rgba(255,255,255,0.1); }
      50% { box-shadow: 0 0 40px rgba(184,84,112,0.35), 0 0 100px rgba(184,84,112,0.12), inset 0 -4px 10px rgba(0,0,0,0.35), inset 0 2px 6px rgba(255,255,255,0.1); }
    }
    .emblem::before {
      content: '';
      position: absolute; inset: 5px;
      border-radius: 50%;
      border: 1px solid rgba(237,228,218,0.15);
    }
    .emblem:hover {
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow: 0 0 40px rgba(184,84,112,0.4), 0 0 100px rgba(184,84,112,0.15),
                  inset 0 -4px 10px rgba(0,0,0,0.35), inset 0 2px 6px rgba(255,255,255,0.1);
    }
    .emblem:active { transform: translate(-50%, -50%) scale(0.96); }
    .emblem i {
      color: rgba(237,228,218,0.9);
      font-size: clamp(20px, 5.5vw, 28px);
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
      transition: transform 0.3s ease;
    }
    .emblem:hover i { transform: scale(1.1); }
    .emblem span {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.55rem, 1.6vw, 0.7rem);
      color: rgba(237,228,218,0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .emblem.gone {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0; animation: none; pointer-events: none;
    }

    .letter-content {
      position: absolute;
      top: 10%; left: 8%; right: 8%; bottom: 10%;
      background: linear-gradient(165deg, #181214, #201820);
      border-radius: 6px; z-index: 1;
      border: 1px solid rgba(201,169,110,0.06);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s;
    }
    .letter-content.show { opacity: 1; transform: translateY(0); }
    .letter-content .lc-heart {
      font-size: clamp(24px, 6vw, 32px);
      color: var(--rose); margin-bottom: 12px; opacity: 0;
    }
    .letter-content.show .lc-heart { animation: heartIn 0.6s ease 0.4s forwards; }
    @keyframes heartIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 0.55; transform: scale(1); }
    }
    .letter-content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--cream); margin-bottom: 8px; opacity: 0;
    }
    .letter-content.show h2 { animation: softIn 0.6s ease 0.6s forwards; }
    .letter-content p {
      font-size: clamp(0.68rem, 1.8vw, 0.8rem);
      color: var(--text-dim); font-weight: 700;
      line-height: 1.6; opacity: 0;
    }
    .letter-content.show p { animation: softIn 0.6s ease 0.8s forwards; }

    /* ===== GALLERY ===== */
    .gallery {
      position: relative; z-index: 5;
      max-width: 1000px; margin: 0 auto;
      padding: 80px 20px 100px;
      display: none; opacity: 0; transform: translateY(40px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .gallery.ready { display: block; }
    .gallery.visible { opacity: 1; transform: translateY(0); }

    .gallery-head { text-align: center; margin-bottom: 48px; }
    .gallery-head .gh-deco {
      display: flex; align-items: center;
      justify-content: center; gap: 14px; margin-bottom: 14px;
    }
    .gallery-head .gh-deco span {
      height: 1px; width: 50px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }
    .gallery-head .gh-deco i { color: var(--rose); font-size: 8px; opacity: 0.5; }
    .gallery-head h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(1.3rem, 4vw, 2rem);
      color: var(--cream); letter-spacing: 1px;
    }
    .gallery-head p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; color: var(--text-dim);
      font-size: clamp(0.78rem, 2vw, 0.92rem); margin-top: 4px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .photo-card {
      position: relative; border-radius: 10px;
      overflow: hidden; background: var(--card);
      border: 1px solid var(--card-border);
      opacity: 0; transform: translateY(40px);
      transition: transform 0.7s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.4s ease, border-color 0.4s ease, opacity 0.7s ease;
    }
    .photo-card:nth-child(1) { transition-delay: 0s; }
    .photo-card:nth-child(2) { transition-delay: 0.08s; }
    .photo-card:nth-child(3) { transition-delay: 0.16s; }
    .photo-card:nth-child(4) { transition-delay: 0.24s; }
    .photo-card:nth-child(5) { transition-delay: 0.32s; }
    .photo-card:nth-child(6) { transition-delay: 0.4s; }
    .photo-card.show { opacity: 1; transform: translateY(0); }
    .photo-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(184,84,112,0.15);
      border-color: var(--rose-faint);
    }

    .photo-frame {
      position: relative; width: 100%;
      aspect-ratio: 4/3; overflow: hidden; background: #0C090A;
    }
    .photo-frame img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.22,1,0.36,1), filter 0.6s ease;
      filter: saturate(0.7) brightness(0.78) contrast(1.05);
    }
    .photo-card:hover .photo-frame img {
      transform: scale(1.08);
      filter: saturate(0.9) brightness(0.9) contrast(1.05);
    }
    .photo-frame::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 45%;
      background: linear-gradient(to top, rgba(12,9,10,0.9), transparent);
      pointer-events: none; z-index: 2;
    }
    .photo-num {
      position: absolute; top: 10px; left: 10px; z-index: 3;
      font-family: 'Cormorant Garamond', serif; font-size: 11px;
      color: var(--gold-dim);
      background: rgba(12,9,10,0.6);
      backdrop-filter: blur(6px);
      padding: 2px 10px; border-radius: 20px; letter-spacing: 2px;
    }
    .photo-sticker {
      position: absolute; z-index: 3; pointer-events: none;
      font-size: 14px;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.4));
      opacity: 0.6;
    }
    .photo-sticker.pos-tr { top: 8px; right: 8px; }
    .photo-sticker.pos-bl { bottom: 8px; left: 8px; }
    .photo-caption { padding: 14px 16px 16px; }
    .photo-caption h3 {
      font-family: 'Cormorant Garamond', serif; font-weight: 600;
      color: var(--cream);
      font-size: clamp(0.9rem, 2.2vw, 1rem);
      margin-bottom: 3px; transition: color 0.3s;
    }
    .photo-card:hover .photo-caption h3 { color: var(--rose-soft); }
    .photo-caption p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.68rem, 1.7vw, 0.78rem);
      color: var(--text-dim); line-height: 1.4;
    }

    /* ===== FOOTER ===== */
    .footer-end {
      position: relative; z-index: 5; text-align: center;
      padding: 0 20px 60px;
      display: none; opacity: 0; transform: translateY(16px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .footer-end.ready { display: block; }
    .footer-end.visible { opacity: 1; transform: translateY(0); }
    .footer-end .fe-line {
      width: 40px; height: 1px;
      background: var(--rose-faint); margin: 0 auto 16px;
    }
    .footer-end p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      color: var(--rose-soft); opacity: 0.7;
    }
    .footer-end .fe-hearts {
      margin-top: 10px; display: flex;
      justify-content: center; gap: 5px;
    }
    .footer-end .fe-hearts i {
      color: var(--rose); font-size: 10px;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .footer-end .fe-hearts i.show { opacity: 0.5; }

    .burst-petal { position: fixed; pointer-events: none; z-index: 50; }

    @media (max-width: 768px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
    @media (max-width: 480px) {
      .photo-grid { grid-template-columns: 1fr; max-width: 340px; margin: 0 auto; gap: 16px; }
      .envelope-box { width: clamp(250px, 82vw, 300px); }
      .emblem { width: clamp(70px, 20vw, 90px); height: clamp(70px, 20vw, 90px); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.15s !important;
      }
    }
  </style>
</head>
<body>

  <canvas id="petalCanvas" aria-hidden="true"></canvas>

  <section class="envelope-hero" id="envelopeHero">
    <p class="hero-pre">Hi Aurel! Adli made this for you, can you open it?</p>
    <div class="envelope-box" id="envelopeBox">
      <div class="env-tri"></div>
      <div class="env-body">
        <div class="env-pattern"></div>
        <span class="env-label">Sincerely, Aurel.</span>
        <div class="env-lines"><span></span><span></span></div>
      </div>
      <div class="env-flap" id="envFlap"></div>
      <button class="emblem" id="emblemBtn" aria-label="Buka surat">
        <i class="fas fa-heart"></i>
        <span>Open</span>
      </button>
      <div class="letter-content" id="letterContent">
        <div class="lc-heart"><i class="fas fa-heart"></i></div>
        <h2>Aku Punya Sesuatu untukmu</h2>
        <p>Beberapa kenangan yang selalu aku simpan baik-baik</p>
      </div>
    </div>
  </section>

  <section class="gallery" id="gallery" aria-label="Kenangan bersama">
    <div class="gallery-head">
      <div class="gh-deco">
        <span></span><i class="fas fa-heart"></i><span></span>
      </div>
      <h2>Our Memories</h2>
      <p>this is the memories that we can't forget</p>
    </div>
    <div class="photo-grid" id="photoGrid"></div>
  </section>

  <footer class="footer-end" id="footerEnd">
    <div class="fe-line"></div>
    <p>i js wanna say, thank u for loving me, i love u so much!</p>
    <div class="fe-hearts" id="feHearts"></div>
  </footer>

  <script>
    /* ============================================================
       CARA PAKAI: ganti setiap 'src' di bawah dengan link foto kamu.
       Bisa 6 link berbeda, atau boleh sama semua.
       ============================================================ */
    const photos = [
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489073870223970434/B7393F4E-F0D5-4191-84D4-3D41A5ACDA03.jpg?ex=69cf179c&is=69cdc61c&hm=93b01f07466165136a05f41d497e0590e4e44048a6c8375960ef570ca074037a&',
        title: 'Playstation Date',
        desc: 'this is us while playing playstation',
        sticker: '<i class="fas fa-heart" style="color:#D4849A"></i>',
        pos: 'pos-tr'
      },
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489076698853933308/dc7d1c07-fb63-4238-bf38-237cbd18436e.jpg?ex=69cf1a3e&is=69cdc8be&hm=cb347a9f6a8484d7610cc133285cc4b1e6a66ee90f644c102faaa6d33384c00b&',

        title: 'Searching for takjiel',
        desc: 'in my helmet eh?',
        sticker: '<i class="fas fa-seedling" style="color:#C9A96E"></i>',
        pos: 'pos-bl'
      },
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489073871280930856/01F266F1-E361-476B-977C-E7140A743C90.jpg?ex=69cf179c&is=69cdc61c&hm=fc4d51d12d2381bb8389e8b663c6445eb74dcbd241d6d74a150470222cd8e726&',
        title: 'At School',
        desc: 'same school btw',
        sticker: '<i class="fas fa-star" style="color:#C9A96E"></i>',
        pos: 'pos-tr'
      },
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489073871058374719/IMG_0385.jpg?ex=69cf179c&is=69cdc61c&hm=efca58dd9eeb61b1bb85d811a5c581b11a607dfe6c5b3d18e9484112b5782e79&',

        title: 'Sunset',
        desc: 'im taking her sunset, shes cute though',
        sticker: '<i class="fas fa-cloud-rain" style="color:#D4849A"></i>',
        pos: 'pos-bl'
      },
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489076699256721429/685AEC61-D9F4-48C6-9550-F3CE7A7463A3.jpg?ex=69cf1a3e&is=69cdc8be&hm=227db19862add462e227922d9fcc153ed3b392a0294e4eb7b42a5476775d7aac&',
        title: 'Buy a bread',
        desc: 'i dunno why, she really likes bread',
        sticker: '<i class="fas fa-road" style="color:#C9A96E"></i>',
        pos: 'pos-tr'
      },
      {
        src: 'https://cdn.discordapp.com/attachments/1370623581804957799/1489073871847161976/cdb80118-5059-44d8-a23d-303d4a1a29fc.jpg?ex=69cf179c&is=69cdc61c&hm=80475ebf03f1e0f7638f3548029ec0136c64fbac9ad0649f6dbc3e7cb2216bc9&',
        title: 'Her',
        desc: 'look, shes cute eh? of course, shes my girl(wife)',
        sticker: '<i class="fas fa-fire" style="color:#D4849A"></i>',
        pos: 'pos-bl'
      }
    ];

    const romNums = ['I','II','III','IV','V','VI'];

    const emblemBtn = document.getElementById('emblemBtn');
    const envFlap = document.getElementById('envFlap');
    const letterContent = document.getElementById('letterContent');
    const gallery = document.getElementById('gallery');
    const photoGrid = document.getElementById('photoGrid');
    const footerEnd = document.getElementById('footerEnd');
    const feHearts = document.getElementById('feHearts');
    const envelopeBox = document.getElementById('envelopeBox');
    const envelopeHero = document.getElementById('envelopeHero');

    let isOpen = false;

    /* Render foto — pakai src langsung, bukan seed */
    photos.forEach((p, i) => {
      const card = document.createElement('article');
      card.className = 'photo-card';
      card.innerHTML = `
        <div class="photo-frame">
          <img src="${p.src}" alt="${p.title}" loading="lazy">
          <span class="photo-sticker ${p.pos}">${p.sticker}</span>
          <span class="photo-num">${romNums[i]}</span>
        </div>
        <div class="photo-caption">
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
        </div>`;
      photoGrid.appendChild(card);
    });

    for (let i = 0; i < 5; i++) {
      const h = document.createElement('i');
      h.className = 'fas fa-heart';
      feHearts.appendChild(h);
    }

    /* ===== Kelopak Canvas ===== */
    const canvas = document.getElementById('petalCanvas');
    const ctx = canvas.getContext('2d');
    let petals = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Petal {
      constructor(init) { this.reset(init); }
      reset(init) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : canvas.height + 20;
        this.s = Math.random() * 3 + 1.5;
        this.vy = -(Math.random() * 0.35 + 0.1);
        this.vx = (Math.random() - 0.5) * 0.15;
        this.op = Math.random() * 0.14 + 0.03;
        this.fade = Math.random() * 0.0004 + 0.0002;
        this.w = Math.random() * Math.PI * 2;
        this.ws = Math.random() * 0.008 + 0.003;
        this.rot = Math.random() * 360;
        this.rs = (Math.random() - 0.5) * 0.6;
        const cols = ['184,84,112','212,132,154','201,169,110','237,228,218'];
        this.c = cols[Math.floor(Math.random() * cols.length)];
      }
      update() {
        this.w += this.ws;
        this.x += this.vx + Math.sin(this.w) * 0.25;
        this.y += this.vy;
        this.rot += this.rs;
        this.op -= this.fade;
        if (this.op <= 0 || this.y < -20) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, this.op);
        const r = Math.max(0.5, this.s);
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 1.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.c},${Math.max(0, this.op)})`;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < 28; i++) petals.push(new Petal(true));

    function animPetals() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      petals.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animPetals);
    }
    animPetals();

    /* ===== Burst ===== */
    function burstPetals(ox, oy) {
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'burst-petal';
        const size = Math.random() * 8 + 4;
        const angle = (Math.PI * 2 * i) / 18 + (Math.random() - 0.5) * 0.5;
        const dist = Math.random() * 110 + 50;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist - 30;
        const dur = Math.random() * 600 + 500;
        const cols = ['#D4849A','#B85470','#C9A96E','#EDE4DA'];
        const col = cols[Math.floor(Math.random() * cols.length)];
        el.innerHTML = `<i class="fas fa-heart" style="color:${col};font-size:${size}px;opacity:0.5"></i>`;
        el.style.left = ox + 'px';
        el.style.top = oy + 'px';
        el.style.transition = `all ${dur}ms cubic-bezier(0.22,1,0.36,1)`;
        document.body.appendChild(el);
        requestAnimationFrame(() => {
          el.style.transform = `translate(${dx}px,${dy}px) rotate(${Math.random()*60-30}deg) scale(0.2)`;
          el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), dur + 50);
      }
    }

    /* ===== BUKA ===== */
    emblemBtn.addEventListener('click', function () {
      if (isOpen) return;
      isOpen = true;

      const rect = emblemBtn.getBoundingClientRect();
      burstPetals(rect.left + rect.width / 2, rect.top + rect.height / 2);
      emblemBtn.classList.add('gone');

      setTimeout(() => envFlap.classList.add('open'), 300);
      setTimeout(() => letterContent.classList.add('show'), 650);
      setTimeout(() => {
        gallery.classList.add('ready');
        footerEnd.classList.add('ready');
      }, 900);
      setTimeout(() => {
        gallery.classList.add('visible');
        gallery.scrollIntoView({ behavior: 'smooth' });
      }, 1400);
      setTimeout(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('show');
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        document.querySelectorAll('.photo-card').forEach(c => obs.observe(c));
      }, 1600);
      setTimeout(() => {
        const fObs = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              footerEnd.classList.add('visible');
              feHearts.querySelectorAll('i').forEach((h, i) => {
                setTimeout(() => h.classList.add('show'), i * 150);
              });
              fObs.unobserve(e.target);
            }
          });
        }, { threshold: 0.3 });
        fObs.observe(footerEnd);
      }, 1800);
    });

    /* ===== Parallax ===== */
    envelopeHero.addEventListener('mousemove', function (e) {
      if (isOpen) return;
      const rect = envelopeHero.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      envelopeBox.style.transform = `rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
    });
    envelopeHero.addEventListener('mouseleave', function () {
      envelopeBox.style.transition = 'transform 0.6s ease';
      envelopeBox.style.transform = 'rotateY(0deg) rotateX(0deg)';
      setTimeout(() => envelopeBox.style.transition = '', 600);
    });
  </script>
</body>
